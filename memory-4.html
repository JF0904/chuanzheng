    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            min-height: 100vh;
            background: #0a0a2a;
            overflow-x: auto;
            font-family: 'Segoe UI', 'Poppins', 'Noto Serif SC', 'Georgia', serif;
        }
        .page-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }
        .dynamic-bg::before {
            content: '';
            position: absolute;
            width: 300%;
            height: 300%;
            top: -100%;
            left: -100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.9"/></svg>');
            background-size: 90px 90px;
            background-repeat: repeat;
            animation: floatSlow 32s linear infinite;
            pointer-events: none;
        }
        .dynamic-bg::after {
            content: '';
            position: absolute;
            width: 300%;
            height: 300%;
            top: -100%;
            left: -100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><circle cx="60" cy="60" r="30" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.6"/></svg>');
            background-size: 110px 110px;
            background-repeat: repeat;
            animation: floatReverse 40s linear infinite reverse;
            pointer-events: none;
            opacity: 0.7;
        }
        .dynamic-bg .aura-overlay {
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(circle at 30% 40%, rgba(120, 80, 200, 0.25), transparent 60%),
                        repeating-radial-gradient(circle at 70% 60%, rgba(200, 130, 255, 0.1), transparent 80px);
            filter: blur(65px);
            mix-blend-mode: screen;
            animation: slowRotate 34s infinite reverse linear;
            pointer-events: none;
        }
        .dynamic-bg .grid-enhance {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 50px), repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 50px);
            pointer-events: none;
            animation: subtleShift 24s linear infinite;
        }
        @keyframes floatSlow {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-120px, -120px) rotate(360deg); }
        }
        @keyframes floatReverse {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(80px, 80px) rotate(360deg); }
        }
        @keyframes slowRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes subtleShift {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .content-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 1300px;
            width: 100%;
            border: 1px solid rgba(200, 180, 255, 0.5);
        }
        .page-header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(210, 170, 255, 0.5);

        }
        .back-link {

            margin-bottom: 1rem;
            color: #FFD966;
            text-decoration: none;
            font-size: 1rem;
            border: 1px solid rgba(255, 217, 102, 0.5);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.4);
            transition: all 0.3s;
        }
        .back-link:hover {
            background: rgba(255, 217, 102, 0.2);
            transform: translateY(-2px);
        }
        .spirit-title {
            font-size: clamp(1.6rem, 5vw, 2.3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6B0, #FFD966, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .class-section {
            margin-bottom: 2rem;
            background: rgba(20, 15, 45, 0.6);
            border-radius: 1.2rem;
            padding: 1.2rem;
            border: 1px solid rgba(210, 170, 255, 0.3);
        }
        .class-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #FFD966;
            margin-bottom: 0.3rem;
            border-left: 4px solid #FFB347;
            padding-left: 0.8rem;
        }
        .class-sub {
            font-size: 0.8rem;
            color: #bcb0e6;
            margin-bottom: 1rem;
            padding-left: 1rem;
        }
        .name-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 0.5rem;
        }
        .name-item {
            font-size: 0.85rem;
            color: #e0d6ff;
            padding: 0.2rem 0.4rem;
            border-bottom: 1px dashed rgba(255, 217, 102, 0.2);
        }
        @media (max-width: 768px) {
            .name-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .class-title { font-size: 1.1rem; }
            .content-card { padding: 1rem; }
        }
    </style>
</head>
